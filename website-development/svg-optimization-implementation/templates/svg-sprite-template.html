<!--
  SVG Sprite Template (External File: assets/icons.svg)
  ----------------------------------------------------
  Define all site icons here as <symbol> elements.
  Note: Set fill="currentColor" on paths to allow CSS overrides.
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">

  <!-- Icon: Chevron Down -->
  <symbol id="icon-chevron-down" viewBox="0 0 24 24">
    <path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Icon: Close / X -->
  <symbol id="icon-close" viewBox="0 0 24 24">
    <path d="M18 6L6 18M6 6l12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Icon: Check -->
  <symbol id="icon-check" viewBox="0 0 24 24">
    <polyline points="20 6 9 17 4 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

</svg>
