<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Profile Photo Uploader Example</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --error-color: #dc2626;
            --border-color: #d1d5db;
            --bg-gray: #f9fafb;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 2rem;
            line-height: 1.5;
        }

        .uploader-container {
            max-width: 400px;
            margin: 0 auto;
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* Custom Drop Zone Styles */
        .drop-zone {
            border: 2px dashed var(--border-color);
            border-radius: 0.5rem;
            padding: 2rem;
            text-align: center;
            background-color: var(--bg-gray);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .drop-zone--dragover {
            border-color: var(--primary-color);
            background-color: #eff6ff;
        }

        .drop-zone:focus-within {
            outline: 2px solid var(--primary-color);
            outline-offset: 2px;
        }

        .upload-button {
            display: inline-block;
            padding: 0.5rem 1rem;
            background-color: var(--primary-color);
            color: white;
            border-radius: 0.375rem;
            font-weight: 500;
            margin-top: 1rem;
            cursor: pointer;
        }

        .upload-button:hover {
            background-color: var(--primary-hover);
        }

        /* Preview Styles */
        .preview-container {
            margin-top: 1.5rem;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            background: white;
        }

        .preview-image {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 0.25rem;
        }

        .file-info {
            flex-grow: 1;
            font-size: 0.875rem;
        }

        .remove-button {
            background: none;
            border: 1px solid var(--border-color);
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .remove-button:hover {
            background: #fee2e2;
            border-color: var(--error-color);
            color: var(--error-color);
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }

        #status-announcer {
            /* Standard visually hidden live region */
        }
    </style>
</head>
<body>

    <div class="uploader-container">
        <h1>Profile Photo</h1>
        <p id="upload-instructions">Upload a JPG or PNG file. Maximum size 2MB.</p>

        <form id="upload-form">
            <div id="drop-zone" class="drop-zone">
                <span aria-hidden="true">📸</span>
                <p>Drag and drop your photo here or</p>

                <!-- The actual focusable input -->
                <label for="file-input" class="upload-button">
                    Select File
                </label>
                <input type="file"
                       id="file-input"
                       class="visually-hidden"
                       accept="image/jpeg,image/png"
                       aria-describedby="upload-instructions"
                >
            </div>

            <div id="error-message" class="error-message" role="alert"></div>

            <div id="preview-container" class="preview-container">
                <!-- File list will be injected here -->
            </div>

            <!-- ARIA Live region for screen reader announcements -->
            <div id="status-announcer" class="visually-hidden" aria-live="polite"></div>
        </form>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const statusAnnouncer = document.getElementById('status-announcer');
        const errorMessage = document.getElementById('error-message');

        let currentFileUrl = null;

        // Prevent default drag behaviors
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // Highlight drop zone when item is dragged over it
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.classList.add('drop-zone--dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.classList.remove('drop-zone--dragover');
            }, false);
        });

        // Handle dropped files
        dropZone.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            handleFiles(files);
        });

        // Handle selected files
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            const file = files[0];
            if (!file) return;

            // Reset error
            errorMessage.textContent = '';
            errorMessage.style.display = 'none';

            // Validation
            if (!file.type.startsWith('image/')) {
                showError('Please upload an image file (JPG or PNG).');
                return;
            }

            if (file.size > 2 * 1024 * 1024) {
                showError('File is too large. Maximum size is 2MB.');
                return;
            }

            updatePreview(file);
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.style.display = 'block';
            statusAnnouncer.textContent = `Error: ${msg}`;
        }

        function updatePreview(file) {
            // Clean up old object URL to prevent memory leaks
            if (currentFileUrl) {
                URL.revokeObjectURL(currentFileUrl);
            }

            currentFileUrl = URL.createObjectURL(file);

            // Clear container and build structure safely
            previewContainer.innerHTML = '';

            const fileItem = document.createElement('div');
            fileItem.className = 'file-item';

            const img = document.createElement('img');
            img.src = currentFileUrl;
            img.alt = '';
            img.className = 'preview-image';

            const fileInfo = document.createElement('div');
            fileInfo.className = 'file-info';

            const name = document.createElement('strong');
            name.textContent = file.name;

            const size = document.createElement('div');
            size.textContent = `${(file.size / 1024).toFixed(1)} KB`;

            fileInfo.appendChild(name);
            fileInfo.appendChild(size);

            const removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.className = 'remove-button';
            removeBtn.setAttribute('aria-label', `Remove ${file.name}`);
            removeBtn.textContent = 'Remove';
            removeBtn.addEventListener('click', () => {
                clearFile();
            });

            fileItem.appendChild(img);
            fileItem.appendChild(fileInfo);
            fileItem.appendChild(removeBtn);

            previewContainer.appendChild(fileItem);

            // Announce success
            statusAnnouncer.textContent = `File selected: ${file.name}`;

            // Add remove handler
            const removeBtn = previewContainer.querySelector('.remove-button');
            removeBtn.addEventListener('click', () => {
                clearFile();
            });
        }

        function clearFile() {
            if (currentFileUrl) {
                URL.revokeObjectURL(currentFileUrl);
                currentFileUrl = null;
            }
            fileInput.value = '';
            previewContainer.innerHTML = '';
            statusAnnouncer.textContent = 'File removed';
            fileInput.focus();
        }
    </script>
</body>
</html>
