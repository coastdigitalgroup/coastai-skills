# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false
reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  auto_title_placeholder: "@coderabbitai"
  review_status: true
  commit_status: true
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  auto_apply_labels: false
  suggested_reviewers: false
  poem: false
  abort_on_close: true
  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
  finishing_touches:
    docstrings:
      enabled: true
  tools:
    eslint:
      enabled: true
    markdownlint:
      enabled: true
    gitleaks:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 90000
    yamllint:
      enabled: true
    languagetool:
      enabled: true
      level: default
    actionlint:
      enabled: true
  path_instructions:
    - path: "**/*.ts"
      instructions: "Enforce strict TypeScript: flag missing type annotations, any usage, non-null assertions without justification, and unhandled promise rejections."
    - path: "src/skills.ts"
      instructions: "File system discovery and frontmatter parsing layer. Verify getCategories() and discoverSkills() remain the single source of truth for traversal — flag any duplication of that logic elsewhere. Check that EXCLUDED_DIRS correctly gates non-skill directories."
    - path: "src/server.ts"
      instructions: "MCP stdio server entry point. Verify tool handlers (search_skills, list_skills, get_skill) have correct input schemas, proper error responses for unknown tools, and that the server version reads from package.json via createRequire rather than being hardcoded."
    - path: "src/**"
      instructions: "Thin MCP transport layer — all execution value belongs in skill files, not here. Flag any logic that duplicates skill discovery, embeds skill content, or grows the server beyond routing and search scoring."
    - path: "website-design/**"
      instructions: "Website design skill files. Verify each SKILL.md has valid frontmatter with name and description fields, description is written for agent scanning (1-2 sentences, present-tense, task-focused), and skill body covers Purpose, Use Cases, When NOT to Use, Inputs, Outputs, Workflow, and Constraints."
    - path: "website-development/**"
      instructions: "Website development skill files. Verify each SKILL.md has valid frontmatter with name and description fields, description is written for agent scanning (1-2 sentences, present-tense, task-focused), and skill body covers Purpose, Use Cases, When NOT to Use, Inputs, Outputs, Workflow, and Constraints."
    - path: "website-growth/**"
      instructions: "Website growth and CRO skill files. Verify each SKILL.md has valid frontmatter with name and description fields, description is written for agent scanning (1-2 sentences, present-tense, task-focused), and skill body covers Purpose, Use Cases, When NOT to Use, Inputs, Outputs, Workflow, and Constraints."
    - path: "package.json"
      instructions: "Review dependency additions carefully. Flag unpinned major versions and any new packages that introduce unnecessary external surface area."
    - path: "CHANGELOG.md"
      instructions: "Verify entries follow Keep a Changelog format with correct categorization (Added/Changed/Fixed/Removed) and link to a version tag."
chat:
  auto_reply: true
knowledge_base:
  opt_out: false
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
