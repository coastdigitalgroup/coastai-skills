<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Pagination Example</title>
    <style>
        .pagination {
            display: flex;
            list-style: none;
            padding: 0;
            gap: 4px;
        }
        .pagination-item {
            display: inline;
        }
        .pagination-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            min-height: 44px;
            padding: 8px;
            border: 1px solid #0056b3;
            text-decoration: none;
            color: #0056b3;
        }
        .pagination-link[aria-current="page"] {
            background-color: #0056b3;
            color: white;
        }
        .pagination-link.disabled {
            border-color: #ccc;
            color: #999;
            pointer-events: none;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>

    <nav aria-label="Pagination Navigation">
        <ul class="pagination">
            <li class="pagination-item">
                <a href="/shop?page=1" class="pagination-link">
                    <span class="sr-only">Previous Page</span>
                    <span aria-hidden="true">&laquo;</span>
                </a>
            </li>
            <li class="pagination-item">
                <a href="/shop?page=1" class="pagination-link" aria-label="Go to Page 1">1</a>
            </li>
            <li class="pagination-item">
                <!-- Current Page -->
                <a href="/shop?page=2" class="pagination-link" aria-label="Page 2" aria-current="page">2</a>
            </li>
            <li class="pagination-item">
                <a href="/shop?page=3" class="pagination-link" aria-label="Go to Page 3">3</a>
            </li>
            <li class="pagination-item">
                <span class="pagination-link disabled" aria-hidden="true">...</span>
            </li>
            <li class="pagination-item">
                <a href="/shop?page=10" class="pagination-link" aria-label="Go to Page 10">10</a>
            </li>
            <li class="pagination-item">
                <a href="/shop?page=3" class="pagination-link">
                    <span class="sr-only">Next Page</span>
                    <span aria-hidden="true">&raquo;</span>
                </a>
            </li>
        </ul>
    </nav>

</body>
</html>
